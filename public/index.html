<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bird Ticker">
  <meta name="theme-color" content="#0a1628">
  <title>Bird Ticker</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1><span class="emoji">🐦</span> Bird Ticker</h1>
    <div class="header-actions">
      <button class="icon-btn" id="btn-refresh" title="Opdater">🔄</button>
      <button class="icon-btn" id="btn-settings" title="Indstillinger">⚙️</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <h2>⚙️ Indstillinger</h2>

    <div class="form-group">
      <label for="input-user-id">Netfugl Bruger-ID</label>
      <input type="text" id="input-user-id" placeholder="f.eks. 4468" inputmode="numeric">
      <div class="hint">
        Find dit ID i URL'en på din Netfugl profil:<br>
        netfugl.dk/ranking/1/<strong>4468</strong>
      </div>
    </div>

    <div class="form-group">
      <label for="input-list-type">Krydsliste</label>
      <select id="input-list-type">
        <option value="1">Danske Arter</option>
        <option value="2">VP Artsliste</option>
        <option value="3">Danske Årsarter 2000</option>
        <option value="23">Danske Årsarter 2020</option>
        <option value="24">Danske Ringmærkningsarter</option>
        <option value="25">Danske Ædelarter</option>
      </select>
    </div>

    <button class="btn btn-primary" id="btn-save-settings">Gem & Hent Data</button>
    <button class="btn btn-push" id="btn-toggle-push">🔕 Notifikationer fra</button>
    <button class="btn btn-secondary" id="btn-clear">Ryd alle data</button>
  </div>

  <!-- Main Content -->
  <div id="main-content" style="display: none;">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value green" id="stat-ticked">—</div>
        <div class="stat-label">Krydset</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-total" style="color: var(--text);">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-missing-alm" style="color: var(--orange);">—</div>
        <div class="stat-label">Mangler alm</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-missing-su" style="color: var(--orange);">—</div>
        <div class="stat-label">Mangler SU</div>
      </div>
      <div class="stat">
        <div class="stat-value alert" id="stat-alerts">—</div>
        <div class="stat-label">Spottet!</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-observations" style="color: var(--accent);">—</div>
        <div class="stat-label">Obs</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-view="alerts">👁️ Observationer</button>
      <button class="tab" data-view="list">📋 Fugle</button>
      <button class="tab" data-view="ai">💬 Chat</button>
      <button class="tab" data-view="calendar">📅 Kalender</button>
    </div>

    <!-- Filter Bar (for observations view) -->
    <div class="filter-bar" id="obs-filter-bar" style="display: flex;">
      <button class="filter-btn active" data-obs-filter="missing">🎯 Kun manglende</button>
      <button class="filter-btn" data-obs-filter="all">📋 Alle</button>
    </div>

    <!-- Sort Bar (for observations view) -->
    <div class="sort-bar" id="sort-bar">
      <span class="sort-label">Sortér:</span>
      <button class="sort-btn active" data-sort="distance">📍 Afstand</button>
      <button class="sort-btn" data-sort="time">🕔 Seneste</button>
      <button class="sort-btn" data-sort="rarity">⭐ Sjældenhed</button>
      <button class="sort-btn" data-sort="name">🔤 Navn</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading-indicator" style="display: none;">
      <div class="spinner"></div>
      <p>Henter observationer...</p>
    </div>

    <!-- Search Bar (for list view) -->
    <div id="search-bar" style="display: none;" class="search-bar">
      <input type="search" id="search-input" placeholder="Søg art...">
    </div>

    <!-- Alerts View -->
    <div id="view-alerts">
      <div class="date-strip" id="date-strip">
        <button class="date-arrow" id="date-prev" title="Forrige dag">‹</button>
        <div class="date-label" id="date-label">I dag</div>
        <button class="date-arrow" id="date-next" title="Næste dag">›</button>
      </div>
      <div id="obs-map"></div>
      <div class="card-list" id="alerts-container">
        <div class="empty-state">
          <div class="emoji">🔭</div>
          <p>Henter data...</p>
        </div>
      </div>
    </div>

    <!-- List View -->
    <div id="view-list" style="display: none;">
      <div id="list-container"></div>
    </div>

    <!-- AI Chat View -->
    <div id="view-ai">
      <div class="chat-header">
        <div class="chat-meta">💬 Spørg ornitologen</div>
        <button class="btn-link" id="btn-chat-clear" title="Ryd samtale">🗑️ Ryd</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-suggestions" id="chat-suggestions">
        <button class="chat-suggestion" data-prompt="Hvilke arter mangler jeg, og hvor er de mest sandsynlige at finde lige nu?">Hvor jagter jeg mine manglende arter?</button>
        <button class="chat-suggestion" data-prompt="Hvilke 3 lokaliteter er mest oplagte for mig den næste uge?">Top 3 lokaliteter i den næste uge</button>
        <button class="chat-suggestion" data-prompt="Hvad blev observeret i Danmark i går?">Gårsdagens observationer</button>
      </div>
      <form class="chat-input-row" id="chat-form" autocomplete="off">
        <textarea class="chat-input" id="chat-input" rows="1"
                  placeholder="Spørg om manglende arter, lokaliteter, sæson..."></textarea>
        <button type="submit" class="chat-send" id="chat-send" aria-label="Send">➤</button>
      </form>
    </div>

    <!-- Calendar View -->
    <div id="view-calendar" style="display: none;">
      <div class="filter-bar" id="calendar-view-bar">
        <button class="filter-btn active" data-calendar-view="ai">🔮 AI-tolket</button>
        <button class="filter-btn" data-calendar-view="raw">📊 Rådata</button>
      </div>
      <div id="calendar-ai-wrap">
        <div class="calendar-header">
          <div class="calendar-meta" id="calendar-meta"></div>
          <button class="btn-link" id="btn-calendar-refresh" title="Generér på ny">🔄 Genberegn</button>
        </div>
        <div id="calendar-body"></div>
      </div>
      <div class="ai-raw" id="calendar-raw" style="display:none;"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="refresh-time" id="refresh-time">—</div>
      <div>Auto-opdatering hvert 5. minut</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="/js/storage.js"></script>
  <script src="/js/scraper.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
